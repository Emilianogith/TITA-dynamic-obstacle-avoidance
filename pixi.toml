[workspace]
name = "tita-dynamic-obstacle-avoidance"
version = "0.1.0"
description = "Acrobatic obstacle avoidance for the TITA two-wheel legged robot"
authors = ["EugenioBugli"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
cmake        = ">=3.16"
make         = "*"
ninja        = "*"
cxx-compiler = "*"
pkg-config   = "*"

[feature.sim.dependencies]
python    = "3.10.*"
eigen     = "*"
glfw      = ">=3.4,<4"
mujoco    = ">=3.3,<3.4"
pinocchio = ">=3.8,<3.9"
crocoddyl = ">=3.1,<3.2.1"
ipopt     = "*"

[feature.sim.tasks]
configure-sim = { cmd = "cmake -B TITA_MJ/build -S TITA_MJ -DCMAKE_BUILD_TYPE=Release" }
build-sim     = { cmd = "cmake --build TITA_MJ/build --parallel", depends-on = ["configure-sim"] }
run-sim       = { cmd = "./main", cwd = "TITA_MJ/build", depends-on = ["build-sim"] }

[feature.pytools.dependencies]
matplotlib = ">=3.10"
numpy      = ">=2.0"
pandas     = ">=2.0"

[feature.ros]
channels = ["robostack-humble", "conda-forge"]

[feature.ros.dependencies]
c-compiler           = "*"
cxx-compiler         = "*"
sysroot_linux-64     = "2.17.*"
libgl-devel          = "*"
numpy                = "<2"
ros2-distro-mutex    = "0.8.*"
pinocchio            = ">=3.8,<3.9"
crocoddyl            = ">=3.1,<3.2.1"
mujoco               = ">=3.3,<3.4"
eigen                = "*"
ipopt                = "*"
casadi               = "*"
octomap              = "*"
ros-humble-rclcpp        = "*"
ros-humble-std-msgs      = "*"
ros-humble-nav-msgs      = "*"
ros-humble-sensor-msgs   = "*"
ros-humble-geometry-msgs = "*"
ros-humble-tf2           = "*"
ros-humble-tf2-ros       = "*"
ros-humble-std-srvs      = "*"
ros-humble-ament-cmake   = "*"
ros-humble-ament-lint-auto   = "*"
ros-humble-ament-lint-common = "*"
ros-humble-ros2cli       = "*"
ros-humble-ros2topic     = "*"
ros-humble-ros2node      = "*"
ros-humble-rclpy         = "*"
ros-humble-ros2launch    = "*"
ros-humble-launch        = "*"
ros-humble-launch-ros    = "*"
ros-humble-ros2run = "*"
ros-humble-ros2pkg = "*"
colcon-common-extensions = "*"

[feature.ros.tasks]
setup-ros-ws = { cmd = "mkdir -p $HOME/ros2_ws/src && ln -sfn $PIXI_PROJECT_ROOT/tita_controller $HOME/ros2_ws/src/tita_controller" }
build-ros    = { cmd = "cd $HOME/ros2_ws && colcon build --symlink-install --cmake-args -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -Dpinocchio_DIR=$CONDA_PREFIX/lib/cmake/pinocchio -Dcrocoddyl_DIR=$CONDA_PREFIX/lib/cmake/crocoddyl -Dcoal_DIR=$CONDA_PREFIX/lib/cmake/coal", depends-on = ["setup-ros-ws"] }
launch = { cmd = "bash -c 'source ~/ros2_ws/install/setup.bash && ros2 launch tita_controller controller.launch.py'", depends-on = ["build-ros"] }

[environments]
default = { features = ["sim", "pytools"], solve-group = "default" }
ros     = { features = ["ros"],            solve-group = "ros" }
